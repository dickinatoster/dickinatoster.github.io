<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGrad" cx="0.5" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="60%" stop-color="#B3E5FC"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </radialGradient>
    <radialGradient id="pinkFlower" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFE5F0"/>
      <stop offset="50%" stop-color="#FFB3D9"/>
      <stop offset="100%" stop-color="#FF99CC"/>
    </radialGradient>
    <radialGradient id="whiteFlower" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#FFFBFE"/>
      <stop offset="50%" stop-color="#FFF0F7"/>
      <stop offset="100%" stop-color="#FFE0ED"/>
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="0.8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 天空背景 -->
  <rect width="320" height="320" fill="url(#skyGrad)"/>
  
  <!-- 白云 -->
  <g opacity="0.4">
    <ellipse cx="60" cy="40" rx="35" ry="20" fill="#FFFFFF"/>
    <ellipse cx="90" cy="38" rx="30" ry="18" fill="#FFFFFF"/>
    <ellipse cx="240" cy="100" rx="40" ry="22" fill="#FFFFFF"/>
    <ellipse cx="280" cy="105" rx="35" ry="20" fill="#FFFFFF"/>
  </g>

  <!-- 樱花群 1 - 左上 -->
  <g opacity="0.8" transform="translate(40 50)" filter="url(#shadow)">
    <!-- 樱花簇 -->
    <circle cx="0" cy="0" r="3" fill="#90C695"/>
    <circle cx="5" cy="-2" r="3" fill="#90C695"/>
    <circle cx="-5" cy="-2" r="3" fill="#90C695"/>
    
    <!-- 花朵层 1 -->
    <circle cx="2" cy="3" r="5.5" fill="url(#pinkFlower)" stroke="#FFB3D9" stroke-width="0.8"/>
    <circle cx="2" cy="3" r="4" fill="none" stroke="#FF99CC" stroke-width="0.5" opacity="0.6"/>
    
    <!-- 花瓣细节 -->
    <circle cx="0" cy="2" r="1.5" fill="#FF99CC" opacity="0.5"/>
    <circle cx="4" cy="2" r="1.5" fill="#FF99CC" opacity="0.5"/>
    <circle cx="2" cy="0" r="1.5" fill="#FFE5F0" opacity="0.7"/>
    <circle cx="2" cy="4.5" r="1.2" fill="#FF99CC" opacity="0.5"/>
  </g>

  <!-- 樱花群 2 - 右上 -->
  <g opacity="0.75" transform="translate(270 45)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="3" fill="#90C695"/>
    <circle cx="5" cy="-2" r="3" fill="#90C695"/>
    <circle cx="-5" cy="-2" r="3" fill="#90C695"/>
    
    <circle cx="2" cy="3" r="5.5" fill="url(#whiteFlower)" stroke="#FFE0ED" stroke-width="0.8"/>
    <circle cx="2" cy="3" r="4" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
    
    <circle cx="0" cy="2" r="1.5" fill="#FFE0ED" opacity="0.5"/>
    <circle cx="4" cy="2" r="1.5" fill="#FFE0ED" opacity="0.5"/>
    <circle cx="2" cy="0" r="1.5" fill="#FFFBFE" opacity="0.7"/>
    <circle cx="2" cy="4.5" r="1.2" fill="#FFE0ED" opacity="0.5"/>
  </g>

  <!-- 樱花群 3 - 左下 -->
  <g opacity="0.7" transform="translate(50 260)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="3" fill="#90C695"/>
    <circle cx="5" cy="-2" r="3" fill="#90C695"/>
    <circle cx="-5" cy="-2" r="3" fill="#90C695"/>
    
    <circle cx="2" cy="3" r="5.5" fill="url(#pinkFlower)" stroke="#FFB3D9" stroke-width="0.8"/>
    <circle cx="2" cy="3" r="4" fill="none" stroke="#FF99CC" stroke-width="0.5" opacity="0.6"/>
    
    <circle cx="0" cy="2" r="1.5" fill="#FF99CC" opacity="0.5"/>
    <circle cx="4" cy="2" r="1.5" fill="#FF99CC" opacity="0.5"/>
    <circle cx="2" cy="0" r="1.5" fill="#FFE5F0" opacity="0.7"/>
    <circle cx="2" cy="4.5" r="1.2" fill="#FF99CC" opacity="0.5"/>
  </g>

  <!-- 樱花群 4 - 右下 -->
  <g opacity="0.72" transform="translate(280 280)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="3" fill="#90C695"/>
    <circle cx="5" cy="-2" r="3" fill="#90C695"/>
    <circle cx="-5" cy="-2" r="3" fill="#90C695"/>
    
    <circle cx="2" cy="3" r="5.5" fill="url(#whiteFlower)" stroke="#FFE0ED" stroke-width="0.8"/>
    <circle cx="2" cy="3" r="4" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
    
    <circle cx="0" cy="2" r="1.5" fill="#FFE0ED" opacity="0.5"/>
    <circle cx="4" cy="2" r="1.5" fill="#FFE0ED" opacity="0.5"/>
    <circle cx="2" cy="0" r="1.5" fill="#FFFBFE" opacity="0.7"/>
    <circle cx="2" cy="4.5" r="1.2" fill="#FFE0ED" opacity="0.5"/>
  </g>

  <!-- 散落花瓣 -->
  <g opacity="0.5">
    <circle cx="80" cy="80" r="2.5" fill="#FFB3D9"/>
    <circle cx="200" cy="120" r="2" fill="#FFE0ED"/>
    <circle cx="150" cy="180" r="2.2" fill="#FFB3D9"/>
    <circle cx="100" cy="200" r="1.8" fill="#FFE0ED"/>
    <circle cx="220" cy="200" r="2.3" fill="#FFB3D9"/>
    <circle cx="160" cy="250" r="2" fill="#FFE0ED"/>
  </g>

  <!-- 中心装饰樱花 -->
  <g opacity="0.65" transform="translate(160 160)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="3.5" fill="#90C695"/>
    <circle cx="6" cy="-2.5" r="3" fill="#90C695"/>
    <circle cx="-6" cy="-2.5" r="3" fill="#90C695"/>
    
    <circle cx="2.5" cy="4" r="6.5" fill="url(#pinkFlower)" stroke="#FFB3D9" stroke-width="1"/>
    <circle cx="2.5" cy="4" r="4.5" fill="none" stroke="#FF99CC" stroke-width="0.6" opacity="0.6"/>
    
    <circle cx="0" cy="2.5" r="1.8" fill="#FF99CC" opacity="0.6"/>
    <circle cx="5" cy="2.5" r="1.8" fill="#FF99CC" opacity="0.6"/>
    <circle cx="2.5" cy="0.5" r="1.8" fill="#FFE5F0" opacity="0.8"/>
    <circle cx="2.5" cy="5.5" r="1.4" fill="#FF99CC" opacity="0.6"/>
  </g>

