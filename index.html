<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打地鼠挑戰</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #ffe18d;
      --bg-2: #ff9f6e;
      --bg-3: #f35b5b;
      --panel: rgba(255, 248, 229, 0.88);
      --earth: #6f4f37;
      --hole: #362113;
      --mole: #4e3524;
      --accent: #0f7a6a;
      --accent-2: #1848a0;
      --text: #2f1b12;
      --shadow: rgba(40, 18, 8, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 255, 255, 0.65), transparent 30%),
        radial-gradient(circle at 85% 25%, rgba(255, 255, 255, 0.45), transparent 28%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(2px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
      animation: drift 8s ease-in-out infinite alternate;
    }

    body::before {
      width: 220px;
      height: 220px;
      background: #fff5cc;
      top: -60px;
      left: -40px;
    }

    body::after {
      width: 280px;
      height: 280px;
      background: #ffd3b0;
      right: -80px;
      bottom: -100px;
      animation-delay: 1.6s;
    }

    .game-shell {
      width: min(92vw, 760px);
      position: relative;
      z-index: 1;
      padding: 24px;
      border-radius: 30px;
      background: var(--panel);
      backdrop-filter: blur(4px);
      box-shadow: 0 24px 50px var(--shadow);
      animation: rise 0.8s ease-out;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Bungee", cursive;
      letter-spacing: 1px;
      line-height: 1.1;
      color: #4e2512;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.7);
      font-size: clamp(1.6rem, 2.7vw, 2.3rem);
    }

    .subtitle {
      margin: 0 0 18px;
      font-weight: 700;
      opacity: 0.85;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, minmax(90px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: #fff7df;
      border: 2px solid rgba(111, 79, 55, 0.25);
      border-radius: 16px;
      padding: 10px 12px;
      text-align: center;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.06);
    }

    .label {
      display: block;
      font-size: 0.8rem;
      opacity: 0.72;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .value {
      font-size: clamp(1.1rem, 2vw, 1.5rem);
      font-weight: 900;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
      color: #fff;
      font-family: "Noto Sans TC", sans-serif;
    }

    .start-btn {
      background: linear-gradient(120deg, var(--accent), #0a9f8a);
    }

    .reset-btn {
      background: linear-gradient(120deg, var(--accent-2), #2f77ff);
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    .board {
      position: relative;
      background: linear-gradient(180deg, #815d43, var(--earth));
      border-radius: 24px;
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      box-shadow: inset 0 8px 12px rgba(255, 255, 255, 0.14), inset 0 -12px 18px rgba(0, 0, 0, 0.2);
    }

    .board.shake {
      animation: boardShake 0.2s ease;
    }

    .hole {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 50% 45%, #2b170d 10%, var(--hole) 62%, #1b1009 100%);
      cursor: pointer;
      overflow: hidden;
      box-shadow: inset 0 10px 16px rgba(0, 0, 0, 0.45), 0 8px 12px rgba(0, 0, 0, 0.2);
      transform: translateY(6px);
      transition: transform 0.18s ease;
    }

    .hole::after {
      content: "";
      position: absolute;
      left: 16%;
      right: 16%;
      bottom: -12px;
      height: 26px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.28);
      filter: blur(8px);
      pointer-events: none;
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: -72%;
      width: 72%;
      height: 82%;
      transform: translateX(-50%);
      border-radius: 48% 48% 44% 44%;
      background: radial-gradient(circle at 40% 34%, #ffd7b7 5%, #f8b57f 55%, #dd8f57 100%);
      transition: bottom 0.18s ease;
      pointer-events: none;
    }

    .mole::before,
    .mole::after {
      content: "";
      position: absolute;
      top: -16%;
      width: 26px;
      height: 30px;
      background: linear-gradient(180deg, #f8bb8a, #d58451);
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.16);
    }

    .mole::before {
      left: 11%;
      transform: rotate(-10deg);
    }

    .mole::after {
      right: 11%;
      transform: rotate(10deg);
    }

    .mole-face {
      position: absolute;
      inset: 12% 14% 10%;
      border-radius: 45% 45% 42% 42%;
      background: radial-gradient(circle at 50% 35%, #fff5eb 5%, #ffe8d4 68%, #ffd8bc 100%);
    }

    .eye {
      position: absolute;
      top: 30%;
      width: 14px;
      height: 18px;
      border-radius: 50%;
      background: #2a1a12;
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.35);
    }

    .eye.left {
      left: 26%;
    }

    .eye.right {
      right: 26%;
    }

    .nose {
      position: absolute;
      left: 50%;
      top: 51%;
      width: 14px;
      height: 10px;
      border-radius: 50% 50% 60% 60%;
      transform: translateX(-50%);
      background: #e17b77;
    }

    .whisker {
      position: absolute;
      top: 58%;
      width: 24px;
      height: 2px;
      border-radius: 999px;
      background: rgba(76, 46, 31, 0.82);
    }

    .whisker.whisker-left {
      left: 8%;
      transform: rotate(10deg);
      box-shadow: 0 7px 0 rgba(76, 46, 31, 0.82);
    }

    .whisker.whisker-right {
      right: 8%;
      transform: rotate(-10deg);
      box-shadow: 0 7px 0 rgba(76, 46, 31, 0.82);
    }

    .mole-mouth {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 40%;
      height: 14%;
      transform: translateX(-50%);
      border-radius: 0 0 40px 40px;
      border-bottom: 3px solid #7e4a31;
    }

    .hole.active {
      transform: translateY(0);
    }

    .hole.active .mole {
      bottom: -12%;
    }

    .hole.whacked .mole {
      background: radial-gradient(circle at 35% 28%, #fff2b5 10%, #ffd175 62%, #e39b3d 100%);
      animation: bounce 0.2s ease;
    }

    .hole.cat-orange .mole {
      background: radial-gradient(circle at 40% 34%, #ffd7b7 5%, #f8b57f 55%, #dd8f57 100%);
    }

    .hole.cat-gray .mole {
      background: radial-gradient(circle at 40% 34%, #e3e6ee 5%, #b5bdcb 55%, #7c8597 100%);
    }

    .hole.cat-black .mole {
      background: radial-gradient(circle at 40% 34%, #7b8088 5%, #4a4f59 55%, #2f333b 100%);
    }

    .hole.whacked.cat-orange .mole {
      background: radial-gradient(circle at 35% 28%, #fff2b5 10%, #ffd175 62%, #e39b3d 100%);
    }

    .hole.whacked.cat-gray .mole {
      background: radial-gradient(circle at 35% 28%, #ffffff 10%, #d4dbeb 62%, #a8b2c6 100%);
    }

    .hole.whacked.cat-black .mole {
      background: radial-gradient(circle at 35% 28%, #d7dbe3 10%, #9aa3b5 62%, #737c8f 100%);
    }

    .status {
      margin-top: 14px;
      min-height: 1.5em;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .credit {
      margin: 10px 2px 0;
      text-align: right;
      font-size: 0.88rem;
      font-weight: 700;
      opacity: 0.78;
    }

    .hit-text {
      position: absolute;
      transform: translate(-50%, -50%);
      font-family: "Bungee", cursive;
      font-size: clamp(1rem, 1.8vw, 1.35rem);
      color: #fff8da;
      text-shadow: 0 2px 0 rgba(84, 38, 18, 0.85), 0 6px 10px rgba(0, 0, 0, 0.25);
      pointer-events: none;
      z-index: 4;
      animation: popScore 0.55s ease-out forwards;
    }

    .hit-text.minus {
      color: #ffe1dd;
      text-shadow: 0 2px 0 rgba(102, 17, 12, 0.88), 0 6px 10px rgba(0, 0, 0, 0.3);
    }

    .spark {
      position: absolute;
      left: 0;
      top: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
      background: radial-gradient(circle at 35% 35%, #fff5b8 10%, #ffab5b 65%, #e66e24 100%);
      animation: sparkBurst 0.5s ease-out forwards;
      --dx: 0px;
      --dy: -18px;
    }

    @keyframes rise {
      from {
        transform: translateY(14px) scale(0.98);
        opacity: 0;
      }
      to {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes drift {
      from {
        transform: translateY(0) translateX(0);
      }
      to {
        transform: translateY(-14px) translateX(10px);
      }
    }

    @keyframes bounce {
      0% {
        transform: translateX(-50%) scale(1);
      }
      50% {
        transform: translateX(-50%) scale(0.86);
      }
      100% {
        transform: translateX(-50%) scale(1);
      }
    }

    @keyframes popScore {
      from {
        opacity: 0;
        transform: translate(-50%, -40%) scale(0.7);
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -68%) scale(1.2);
      }
      to {
        opacity: 0;
        transform: translate(-50%, -130%) scale(0.88);
      }
    }

    @keyframes sparkBurst {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      to {
        opacity: 0;
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.4);
      }
    }

    @keyframes boardShake {
      0% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-4px);
      }
      50% {
        transform: translateX(4px);
      }
      75% {
        transform: translateX(-2px);
      }
      100% {
        transform: translateX(0);
      }
    }

    @media (max-width: 640px) {
      .game-shell {
        border-radius: 22px;
        padding: 16px;
      }

      .hud {
        gap: 8px;
      }

      .card {
        padding: 8px 10px;
      }

      .board {
        gap: 10px;
        padding: 12px;
      }

      .controls {
        gap: 8px;
      }

      button {
        padding: 9px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <h1>Whack-a-Mole 打地鼠</h1>
    <p class="subtitle">30 秒內打到越多地鼠越厲害</p>

    <section class="hud" aria-label="遊戲資訊">
      <div class="card">
        <span class="label">分數</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="card">
        <span class="label">剩餘時間</span>
        <span class="value" id="time">30</span>
      </div>
      <div class="card">
        <span class="label">最高分</span>
        <span class="value" id="best">0</span>
      </div>
    </section>

    <div class="controls">
      <button class="start-btn" id="startBtn" type="button">開始遊戲</button>
      <button class="reset-btn" id="resetBtn" type="button">重設分數</button>
    </div>

    <section class="board" id="board" aria-label="打地鼠遊戲盤面"></section>
    <p class="status" id="status">按下「開始遊戲」後就會出現地鼠！</p>
    <p class="credit">設計者：文文</p>
  </main>

  <script>
    const GAME_SECONDS = 30;
    const HOLE_COUNT = 9;

    const board = document.getElementById("board");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");

    let score = 0;
    let best = Number(localStorage.getItem("moleBest") || 0);
    let timeLeft = GAME_SECONDS;
    let activeHoleIndex = -1;
    let isRunning = false;
    let timerId = null;
    let moleId = null;
    let audioCtx = null;
    const CAT_COATS = ["cat-orange", "cat-gray", "cat-black"];

    bestEl.textContent = best;

    const holes = Array.from({ length: HOLE_COUNT }, (_, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "hole";
      button.setAttribute("aria-label", `洞口 ${index + 1}`);
      button.dataset.index = index;

      const mole = document.createElement("div");
      mole.className = "mole";
      const face = document.createElement("div");
      face.className = "mole-face";
      const leftEye = document.createElement("span");
      leftEye.className = "eye left";
      const rightEye = document.createElement("span");
      rightEye.className = "eye right";
      const nose = document.createElement("span");
      nose.className = "nose";
      const whiskerLeft = document.createElement("span");
      whiskerLeft.className = "whisker whisker-left";
      const whiskerRight = document.createElement("span");
      whiskerRight.className = "whisker whisker-right";
      const mouth = document.createElement("div");
      mouth.className = "mole-mouth";
      face.append(leftEye, rightEye, nose, whiskerLeft, whiskerRight, mouth);
      mole.appendChild(face);
      button.appendChild(mole);
      board.appendChild(button);
      return button;
    });

    function randomDelay() {
      return Math.floor(Math.random() * 440) + 360;
    }

    function pickHole() {
      let next = Math.floor(Math.random() * HOLE_COUNT);
      while (next === activeHoleIndex) {
        next = Math.floor(Math.random() * HOLE_COUNT);
      }
      return next;
    }

    function hideMoles() {
      holes.forEach((hole) => hole.classList.remove("active", "whacked", ...CAT_COATS));
      activeHoleIndex = -1;
    }

    function randomCatCoat() {
      return CAT_COATS[Math.floor(Math.random() * CAT_COATS.length)];
    }

    function ensureAudioContext() {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) {
        return;
      }
      if (!audioCtx) {
        audioCtx = new Ctx();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playHitSound() {
      if (!audioCtx) {
        return;
      }

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(540, now);
      osc.frequency.exponentialRampToValueAtTime(240, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.22, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
    }

    function playMissSound() {
      if (!audioCtx) {
        return;
      }

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.12);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.09, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.15);
    }

    function spawnHitEffect(target, text = "+1", isMiss = false) {
      const targetRect = target.getBoundingClientRect();
      const boardRect = board.getBoundingClientRect();
      const x = targetRect.left + targetRect.width / 2 - boardRect.left;
      const y = targetRect.top + targetRect.height / 2 - boardRect.top;

      const hitText = document.createElement("span");
      hitText.className = "hit-text";
      if (isMiss) {
        hitText.classList.add("minus");
      }
      hitText.textContent = text;
      hitText.style.left = `${x}px`;
      hitText.style.top = `${y}px`;
      board.appendChild(hitText);
      hitText.addEventListener("animationend", () => hitText.remove(), { once: true });

      for (let i = 0; i < 8; i += 1) {
        const angle = (Math.PI * 2 * i) / 8 + (Math.random() * 0.36 - 0.18);
        const distance = 20 + Math.random() * 16;
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.left = `${x}px`;
        spark.style.top = `${y}px`;
        spark.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
        spark.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
        board.appendChild(spark);
        spark.addEventListener("animationend", () => spark.remove(), { once: true });
      }

      board.classList.remove("shake");
      void board.offsetWidth;
      board.classList.add("shake");
    }

    function showNextMole() {
      if (!isRunning) {
        return;
      }

      hideMoles();
      const index = pickHole();
      activeHoleIndex = index;
      holes[index].classList.add(randomCatCoat());
      holes[index].classList.add("active");
      moleId = window.setTimeout(showNextMole, randomDelay());
    }

    function endGame() {
      isRunning = false;
      window.clearInterval(timerId);
      window.clearTimeout(moleId);
      hideMoles();

      if (score > best) {
        best = score;
        localStorage.setItem("moleBest", String(best));
        bestEl.textContent = best;
        statusEl.textContent = "新紀錄！你是地鼠剋星！";
      } else {
        statusEl.textContent = `時間到！本局分數 ${score} 分。`;
      }

      startBtn.disabled = false;
      startBtn.textContent = "再玩一次";
    }

    function tick() {
      timeLeft -= 1;
      timeEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        endGame();
      }
    }

    function startGame() {
      if (isRunning) {
        return;
      }

      ensureAudioContext();

      score = 0;
      timeLeft = GAME_SECONDS;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      statusEl.textContent = "快點擊冒出的地鼠！";
      isRunning = true;
      startBtn.disabled = true;
      startBtn.textContent = "進行中...";

      showNextMole();
      timerId = window.setInterval(tick, 1000);
    }

    function resetBest() {
      best = 0;
      localStorage.setItem("moleBest", "0");
      bestEl.textContent = "0";
      statusEl.textContent = "最高分已重設，開始挑戰吧！";
    }

    board.addEventListener("click", (event) => {
      const target = event.target.closest(".hole");
      if (!target || !isRunning) {
        return;
      }

      const index = Number(target.dataset.index);
      if (index !== activeHoleIndex) {
        score = Math.max(0, score - 1);
        scoreEl.textContent = score;
        statusEl.textContent = "失誤！-1 分";
        ensureAudioContext();
        playMissSound();
        spawnHitEffect(target, "-1", true);
        return;
      }

      score += 1;
      scoreEl.textContent = score;
      target.classList.add("whacked");
      target.classList.remove("active");
      activeHoleIndex = -1;
      ensureAudioContext();
      playHitSound();
      spawnHitEffect(target);
    });

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetBest);
  </script>
</body>
</html>
