<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端記事本 - Google Drive 集成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #D8A7E5 0%, #C291D8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            height: 90vh;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #D8A7E5 0%, #C291D8 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #FFD700;
            animation: pulse 2s infinite;
        }

        .status-dot.saved {
            background: #00FF00;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 30px;
            gap: 20px;
            overflow: hidden;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e5e5;
        }

        .file-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .file-name input {
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 600;
            color: #D8A7E5;
            padding: 0;
            outline: none;
            max-width: 300px;
            cursor: text;
        }

        .file-name input:disabled {
            color: #D8A7E5;
            cursor: default;
        }

        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #editor {
            flex: 1;
            padding: 15px;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            resize: none;
            color: #333;
            background: #fafafa;
        }

        #editor:focus {
            outline: none;
            border-color: #D8A7E5;
            box-shadow: 0 0 0 3px rgba(216, 167, 229, 0.1);
        }

        .editor-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 12px 15px;
            background: #f9f9f9;
            border-radius: 6px;
            font-size: 12px;
            color: #999;
        }

        .footer-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-primary {
            background: #D8A7E5;
            color: white;
        }

        .btn-primary:hover {
            background: #C291D8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 167, 229, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #d0d0d0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
        }

        .modal-content p {
            margin-bottom: 20px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #D8A7E5;
            box-shadow: 0 0 0 3px rgba(216, 167, 229, 0.1);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-confirm {
            background: #D8A7E5;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            background: #C291D8;
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #4caf50;
        }

        .notification.error {
            background: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .main-content {
                padding: 20px;
            }

            .editor-footer {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .footer-left, .footer-right {
                width: 100%;
                justify-content: space-between;
            }

            button {
                padding: 8px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>☁️ 雲端記事本</h1>
            </div>
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">已就緒</span>
            </div>
        </div>

        <div class="main-content">
            <div class="editor-header">
                <div class="file-name">
                    <span>📄</span>
                    <input type="text" id="filename" value="記事本.txt" readonly>
                </div>
            </div>

            <div class="editor-wrapper">
                <textarea id="editor" placeholder="開始輸入您的筆記..."></textarea>
            </div>

            <div class="editor-footer">
                <div class="footer-left">
                    <div class="stat-item">
                        <span>最後修改：<span id="lastModifiedText">未修改</span></span>
                    </div>
                    <div class="stat-item">
                        <span id="lastSavedText">未保存</span>
                    </div>
                </div>
                <div class="footer-right">
                    <button class="btn-secondary" onclick="handleOpen()">📂 Open</button>
                    <button class="btn-primary" onclick="handleSave()">💾 Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-left-info" style="position:absolute; left:18px; bottom:12px; font-size:12px; color:#666;">
        最後修改時間： <span id="bottomLeftModified">未修改</span>
    </div>

    <!-- Save 對話框 -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h2>💾 Save</h2>
            <p>輸入要儲存的檔案名稱：</p>
            <label>檔案名稱</label>
            <input type="text" id="saveFilename" placeholder="記事本.txt">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSaveModal()">取消</button>
                <button class="btn-confirm" onclick="confirmSave()">儲存</button>
            </div>
        </div>
    </div>

    <!-- Open 對話框 -->
    <div class="modal" id="openModal">
        <div class="modal-content">
            <h2>📂 Open</h2>
            <p>選擇要開啟的檔案：</p>
            <div id="fileList" style="max-height: 300px; overflow-y: auto; margin: 15px 0; padding: 10px; background: #f9f9f9; border-radius: 6px;"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeOpenModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 隱藏的本機檔案選擇器，用於載入 .txt 檔案 -->
    <input type="file" id="filePicker" accept=".txt,text/plain" style="display:none" />

    <script>
        // ============ 配置 ============
        const GAS_SCRIPT_URL = 'https://script.google.com/macros/d/{SCRIPT_ID}/userweb';
        const CLIENT_ID = '{YOUR_CLIENT_ID}.apps.googleusercontent.com';
        const API_KEY = '{YOUR_API_KEY}';
        const SCOPES = 'https://www.googleapis.com/auth/drive';

        // ============ 狀態管理 ============
        let isLoggedIn = false;
        let currentFileId = null;
        let accessToken = null;
        let hasUnsavedChanges = false;

        // ============ 初始化 ============
        function init() {
            loadLocalStorage();
            setupEventListeners();
            updateStatusIndicator();
        }

        // ============ 事件監聽器 ============
        function setupEventListeners() {
            const editor = document.getElementById('editor');
            
            editor.addEventListener('input', () => {
                // 更新最後修改時間顯示（包含日期）
                const now = new Date();
                const ts = now.toLocaleString('zh-TW');
                const lmEl = document.getElementById('lastModifiedText');
                if (lmEl) lmEl.textContent = ts;
                const blEl = document.getElementById('bottomLeftModified');
                if (blEl) blEl.textContent = ts;
                hasUnsavedChanges = true;
                updateStatusIndicator();
                saveToLocalStorage();
            });

            editor.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    handleSave();
                }
            });

            document.getElementById('saveFilename').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmSave();
                }
            });
        }

        // ============ 檔案操作 ============
        function handleSave() {
            const currentName = document.getElementById('filename').value || '記事本.txt';
            document.getElementById('saveFilename').value = currentName;
            document.getElementById('saveModal').classList.add('active');
            document.getElementById('saveFilename').focus();
            document.getElementById('saveFilename').select();
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
        }

        function confirmSave() {
            const filename = document.getElementById('saveFilename').value.trim();
            
            if (!filename) {
                showNotification('檔案名稱不能為空', 'error');
                return;
            }

            document.getElementById('filename').value = filename;

            // 保存到本地存儲
            saveToLocalStorage();
            hasUnsavedChanges = false;
            updateStatusIndicator();
            
            closeSaveModal();
            showNotification(`✅ 已保存：${filename}`, 'success');

            // 嘗試將內容儲存為本機檔案：優先使用 File System Access API，否則用 Blob 下載
            const content = document.getElementById('editor').value;
            saveToFile(filename, content).catch(err => {
                console.error('Save failed:', err);
                showNotification('儲存失敗，請檢查瀏覽器權限', 'error');
            });

            // 更新最後保存與修改時間（包含日期）
            const now = new Date();
            const nowTs = now.toLocaleString('zh-TW');
            document.getElementById('lastSavedText').textContent = `最後保存：${now.toLocaleTimeString('zh-TW')}`;
            const lmEl = document.getElementById('lastModifiedText');
            if (lmEl) lmEl.textContent = nowTs;
            const blEl = document.getElementById('bottomLeftModified');
            if (blEl) blEl.textContent = nowTs;
        }

        function handleOpen() {
                // 觸發隱藏的本機檔案選擇器
                const picker = document.getElementById('filePicker');
                if (picker) {
                    picker.click();
                } else {
                    showNotification('無法開啟檔案選擇器', 'error');
                }
        }

        function closeOpenModal() {
            document.getElementById('openModal').classList.remove('active');
        }

        // 處理使用者選擇本機檔案
        document.addEventListener('DOMContentLoaded', () => {
            const picker = document.getElementById('filePicker');
            if (!picker) return;

            picker.addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;

                // 只讀取純文字檔
                const reader = new FileReader();
                reader.onload = function(evt) {
                    const content = evt.target.result;
                    setEditorContent(content);
                    document.getElementById('filename').value = file.name;
                    // 使用檔案的最後修改時間作為最後修改顯示
                    try {
                        const lm = file.lastModified ? new Date(file.lastModified) : new Date();
                        const ts = lm.toLocaleString('zh-TW');
                        const lmEl = document.getElementById('lastModifiedText');
                        if (lmEl) lmEl.textContent = ts;
                        const blEl = document.getElementById('bottomLeftModified');
                        if (blEl) blEl.textContent = ts;
                        document.getElementById('lastSavedText').textContent = `最後保存：${lm.toLocaleTimeString('zh-TW')}`;
                    } catch (err) {
                        const now = new Date().toLocaleString('zh-TW');
                        const lmEl = document.getElementById('lastModifiedText');
                        if (lmEl) lmEl.textContent = now;
                        const blEl = document.getElementById('bottomLeftModified');
                        if (blEl) blEl.textContent = now;
                    }
                    hasUnsavedChanges = false;
                    updateStatusIndicator();
                    saveToLocalStorage();
                    showNotification(`✅ 已載入：${file.name}`, 'success');
                    // 清空輸入，方便下次選相同檔案能觸發 change
                    picker.value = '';
                };
                reader.readAsText(file, 'UTF-8');
            });
        });

        // ============ 狀態指示 ============
        function updateStatusIndicator() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');

            if (!dot || !text) return;

            if (hasUnsavedChanges) {
                dot.classList.remove('saved');
                text.textContent = '⭐ 未保存';
            } else {
                dot.classList.add('saved');
                text.textContent = '已就緒';
            }
        }

        // ============ 本地存儲 ============
        function saveToLocalStorage() {
            const data = {
                content: document.getElementById('editor').value,
                filename: document.getElementById('filename').value,
                timestamp: new Date().toISOString()
            };
            localStorage.setItem('notepadData', JSON.stringify(data));
        }

        function loadLocalStorage() {
            const saved = localStorage.getItem('notepadData');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    document.getElementById('editor').value = data.content || '';
                    // 若 localStorage 中的名稱為舊預設值（例：新筆記 / 我的筆記），自動改為記事本.txt
                    let filename = data.filename || '記事本.txt';
                    if (filename === '新筆記' || filename === '我的筆記') filename = '記事本.txt';
                    document.getElementById('filename').value = filename;
                    // 將修正後的檔名回寫到 localStorage，避免每次載入都還是舊名稱
                    data.filename = filename;
                    localStorage.setItem('notepadData', JSON.stringify(data));

                    // 將 localStorage 的 timestamp 顯示為最後修改時間（如果有）
                    if (data.timestamp) {
                        const date = new Date(data.timestamp);
                        const ts = date.toLocaleString('zh-TW');
                        document.getElementById('lastSavedText').textContent = `最後保存：${date.toLocaleTimeString('zh-TW')}`;
                        const lm = document.getElementById('lastModifiedText');
                        if (lm) lm.textContent = ts;
                        const bl = document.getElementById('bottomLeftModified');
                        if (bl) bl.textContent = ts;
                    }
                } catch (e) {
                    console.error('Failed to load local storage:', e);
                }
            }
        }

        // ============ 通知 ============
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // 將內容安全地設定到 editor：支援字串或物件
        function setEditorContent(value) {
            const editor = document.getElementById('editor');
            if (!editor) return;
            if (value === null || value === undefined) {
                editor.value = '';
                return;
            }
            if (typeof value === 'string') {
                editor.value = value;
                return;
            }
            // 如果是物件，嘗試取 `content` 欄位，沒有就用 JSON 字串化（可讀）
            try {
                if (typeof value === 'object') {
                    if (value.content && typeof value.content === 'string') {
                        editor.value = value.content;
                    } else {
                        editor.value = JSON.stringify(value, null, 2);
                    }
                } else {
                    editor.value = String(value);
                }
            } catch (e) {
                editor.value = String(value);
            }
        }

        // 儲存檔案到本機（優先使用 File System Access API）
        async function saveToFile(filename, content) {
            // 如果支援 File System Access API，先嘗試使用 save file picker
            if (window.showSaveFilePicker) {
                try {
                    const opts = {
                        suggestedName: filename,
                        types: [
                            {
                                description: 'Text Files',
                                accept: { 'text/plain': ['.txt'] }
                            }
                        ]
                    };
                    const handle = await window.showSaveFilePicker(opts);
                    const writable = await handle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return;
                } catch (err) {
                    // 如果使用者取消或 API 被攔截，回退到 blob 下載
                    console.warn('showSaveFilePicker failed, falling back to blob download', err);
                }
            }

            // 備援：建立 blob 並觸發下載
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        }

        // ============ 應用程式啟動 ============
        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('beforeunload', saveToLocalStorage);
    </script>
</body>
</html>
