<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>打地鼠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg1: #fff2d7;
      --bg2: #ffd69d;
      --ground: #8a5a36;
      --hole: #4d2f1c;
      --mole: #f2d5aa;
      --mole-line: #7f4a25;
      --accent: #ff5c42;
      --ink: #1f2430;
      --muted: #5f6776;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 15%, rgba(255, 255, 255, 0.35), transparent 34%),
        radial-gradient(circle at 86% 22%, rgba(255, 255, 255, 0.22), transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .shell {
      width: min(980px, 100%);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(40, 25, 14, 0.12);
      box-shadow: 0 20px 42px rgba(48, 30, 18, 0.2);
      padding: 18px;
    }

    h1 {
      margin: 0;
      font: 800 clamp(1.8rem, 4vw, 2.7rem)/1.1 "Baloo 2", "Noto Sans TC", sans-serif;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      border-radius: 14px;
      border: 1px solid rgba(40, 25, 14, 0.15);
      padding: 10px 12px;
      background: #fff;
    }

    .stat .label {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
    }

    .stat .value {
      display: block;
      margin-top: 2px;
      font: 800 1.36rem/1 "Baloo 2", "Noto Sans TC", sans-serif;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font: 700 0.94rem/1 "Noto Sans TC", sans-serif;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
      box-shadow: 0 10px 20px rgba(48, 30, 18, 0.2);
    }

    #startBtn {
      background: linear-gradient(120deg, var(--accent), #ff8f57);
      color: #fff;
    }

    #resetBtn {
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(40, 25, 14, 0.18);
      box-shadow: none;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }

    .status {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 1.4em;
    }

    .field {
      border-radius: 18px;
      padding: 14px;
      border: 1px solid rgba(60, 36, 20, 0.2);
      background: linear-gradient(180deg, #c99669, #ad774c);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .hole {
      position: relative;
      height: clamp(110px, 22vw, 150px);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(0, 0, 0, 0.08));
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.22);
      user-select: none;
    }

    .pit {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 84%;
      height: 32%;
      transform: translateX(-50%);
      background: radial-gradient(circle at 50% 45%, #6a4026, var(--hole));
      border-radius: 999px;
      box-shadow: inset 0 8px 14px rgba(0, 0, 0, 0.34);
    }

    .mole {
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 64%;
      aspect-ratio: 1 / 1;
      transform: translate(-50%, 84%);
      transition: transform 120ms ease;
      cursor: pointer;
      background: var(--mole);
      border: 4px solid var(--mole-line);
      border-radius: 50% 50% 44% 44%;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
    }

    .mole::before,
    .mole::after {
      content: "";
      position: absolute;
      top: 22%;
      width: 13%;
      height: 13%;
      border-radius: 50%;
      background: var(--mole-line);
    }

    .mole::before { left: 30%; }
    .mole::after { right: 30%; }

    .nose {
      position: absolute;
      left: 50%;
      top: 43%;
      width: 16%;
      height: 12%;
      border-radius: 999px;
      transform: translateX(-50%);
      background: #c78653;
      border: 2px solid var(--mole-line);
    }

    .mole.up { transform: translate(-50%, 16%); }
    .mole.hit {
      filter: saturate(1.25) brightness(1.05);
      transform: translate(-50%, 22%) scale(0.92);
    }

    .credit {
      margin: 12px 0 0;
      color: var(--muted);
      text-align: right;
      font-size: 0.86rem;
    }

    @media (max-width: 700px) {
      .hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field { gap: 8px; padding: 10px; }
      .hole { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <h1>打地鼠</h1>
    <p class="subtitle">30 秒內盡量點擊冒出來的老鼠，挑戰你的反應速度。</p>

    <section class="hud" aria-label="分數資訊">
      <div class="stat">
        <span class="label">目前分數</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat">
        <span class="label">剩餘時間</span>
        <span class="value" id="time">30</span>
      </div>
      <div class="stat">
        <span class="label">最高分</span>
        <span class="value" id="best">0</span>
      </div>
      <div class="stat">
        <span class="label">命中率</span>
        <span class="value" id="acc">0%</span>
      </div>
    </section>

    <div class="controls">
      <button id="startBtn" type="button">開始遊戲</button>
      <button id="resetBtn" type="button">重設最高分</button>
    </div>

    <p class="status" id="status">按下開始後，點擊冒出的老鼠。</p>

    <section class="field" id="field" aria-label="打地鼠場地"></section>

    <p class="credit">設計者：王怡文</p>
  </main>

  <script>
    const holesCount = 9;
    const gameSeconds = 30;
    const bestKey = "moleBestScore";

    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const bestEl = document.getElementById("best");
    const accEl = document.getElementById("acc");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const fieldEl = document.getElementById("field");

    let score = 0;
    let timeLeft = gameSeconds;
    let best = Number(localStorage.getItem(bestKey) || 0);
    let gameRunning = false;
    let activeIndex = -1;
    let popTimer = null;
    let secTimer = null;
    let attempts = 0;
    let hits = 0;

    bestEl.textContent = String(best);

    function renderHud() {
      scoreEl.textContent = String(score);
      timeEl.textContent = String(timeLeft);
      bestEl.textContent = String(best);
      const ratio = attempts === 0 ? 0 : Math.round((hits / attempts) * 100);
      accEl.textContent = ratio + "%";
    }

    function buildField() {
      for (let i = 0; i < holesCount; i += 1) {
        const hole = document.createElement("button");
        hole.className = "hole";
        hole.type = "button";
        hole.setAttribute("aria-label", "洞口 " + (i + 1));

        const pit = document.createElement("span");
        pit.className = "pit";

        const mole = document.createElement("span");
        mole.className = "mole";
        mole.dataset.index = String(i);

        const nose = document.createElement("span");
        nose.className = "nose";
        mole.appendChild(nose);

        hole.appendChild(pit);
        hole.appendChild(mole);
        fieldEl.appendChild(hole);
      }
    }

    function hideAllMoles() {
      const moles = fieldEl.querySelectorAll(".mole");
      moles.forEach((mole) => {
        mole.classList.remove("up", "hit");
      });
      activeIndex = -1;
    }

    function popMole() {
      hideAllMoles();
      activeIndex = Math.floor(Math.random() * holesCount);
      const mole = fieldEl.querySelector('.mole[data-index="' + activeIndex + '"]');
      if (!mole) {
        return;
      }
      mole.classList.add("up");
      const keep = 420 + Math.floor(Math.random() * 380);
      popTimer = window.setTimeout(popMole, keep);
    }

    function finishGame() {
      gameRunning = false;
      window.clearTimeout(popTimer);
      window.clearInterval(secTimer);
      hideAllMoles();

      if (score > best) {
        best = score;
        localStorage.setItem(bestKey, String(best));
      }

      renderHud();
      statusEl.textContent = "時間到，最終分數 " + score + " 分。";
      startBtn.disabled = false;
      startBtn.textContent = "再玩一次";
    }

    function tickSecond() {
      timeLeft -= 1;
      renderHud();
      if (timeLeft <= 0) {
        finishGame();
      }
    }

    function startGame() {
      score = 0;
      attempts = 0;
      hits = 0;
      timeLeft = gameSeconds;
      gameRunning = true;
      startBtn.disabled = true;
      statusEl.textContent = "遊戲進行中，快點老鼠。";
      renderHud();
      popMole();
      secTimer = window.setInterval(tickSecond, 1000);
    }

    fieldEl.addEventListener("pointerdown", (event) => {
      const mole = event.target.closest(".mole");
      if (!mole || !gameRunning) {
        return;
      }

      attempts += 1;
      const idx = Number(mole.dataset.index);
      if (idx === activeIndex && mole.classList.contains("up")) {
        score += 1;
        hits += 1;
        mole.classList.add("hit");
        window.setTimeout(() => {
          mole.classList.remove("up", "hit");
        }, 110);
        activeIndex = -1;
      }

      renderHud();
    });

    startBtn.addEventListener("click", () => {
      if (!gameRunning) {
        startGame();
      }
    });

    resetBtn.addEventListener("click", () => {
      localStorage.removeItem(bestKey);
      best = 0;
      renderHud();
      statusEl.textContent = "最高分已重設。";
    });

    buildField();
    renderHud();
  </script>
</body>
</html>
